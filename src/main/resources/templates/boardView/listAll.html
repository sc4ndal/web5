<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	  xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<meta charset="UTF-8">
	<title>listAll</title>
	<link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header>
	<h1><a th:href="@{/}">[ 게시판 - 글 목록 ]</a></h1>
</header>
<section>
	<table>
		<tr>
			<td class="white" colspan="4"></td>
			<td class="white">
				<a th:href="@{/board/wirte}" sec:authorize="isAuthenticated()">글쓰기</a>
				<a th:href="@{/}">홈으로</a>
			</td>
		</tr>
		<tr>
			<th>번호</th>
			<th style="width: 300px">제목</th>
			<th>작성자</th>
			<th>조회수</th>
			<th style="width: 150px;">작성일</th>
		</tr>
		<tr th:each="b : ${boardList}" class="center">
			<td th:text="${b.boardNum}" class="center"></td>
			<td><a th:text="${b.title}" th:href="@{/board/read(boardNum=${b.boardNum})}" class="center"></a></td>
			<td th:text="${b.memberName}" class="center"></td>
			<td th:text="${b.viewCount}" class="center"></td>
			<td th:text="${#temporals.format(b.createDate, 'yy.MM.dd HH:mm')}" class="center"></td>
		</tr>
		
	</table>
</section>
</body>
</html>

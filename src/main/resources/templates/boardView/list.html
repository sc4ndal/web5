<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
	<meta charset="UTF-8">
	<title>listAll</title>
	<link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
<header>
	<h1><a th:href="@{/}">[ 게시판 ]</a></h1>
</header>
<section>
	<table>
		<tr>
			<td class="white">
				전체 <span th:text="${boardPage.totalElements}"></span>
			</td>
			<td>
				페이지 <span th:text="|${page} of ${boardPage.totalPages}|"></span>
			</td>
			<td class="white" colspan="2"></td>
			
			<td class="white">
				<!-- 오타 수정: wirte -> write -->
				<a th:href="@{/board/write}" sec:authorize="isAuthenticated()">글쓰기</a>
				<a th:href="@{/}">홈으로</a>
			</td>
		</tr>
		<tr>
			<th>번호</th>
			<th style="width: 300px">제목</th>
			<th>작성자</th>
			<th>조회수</th>
			<th style="width: 150px;">작성일</th>
		</tr>
		<!-- 반복 변수명 변경: boardPage -> board -->
		<tr th:each="board : ${boardPage}" class="center">
			<td th:text="${board.boardNum}" class="center"></td>
			<td><a th:text="${board.title}" th:href="@{/board/read(boardNum=${board.boardNum})}" class="center"></a></td>
			<td th:text="${board.memberName}" class="center"></td>
			<td th:text="${board.viewCount}" class="center"></td>
			<td th:text="${#temporals.format(board.createDate, 'yy.MM.dd HH:mm')}" class="center"></td>
		</tr>
	</table>
	<div id="navigator">
		<!--       페이지 이동 링크 -->
		<nav th:if="${boardPage.totalPages > 0}" class="pagination"
		     th:with="startPage=${page - linkSize < 1 ? 1 : page - linkSize},
						endPage=${page + linkSize > boardPage.totalPages ? boardPage.totalPages : page + linkSize}">
			
			<!--          첫 페이지 -->
			<a th:if="${page > 1}"
			   th:href="@{/board/list(page=1, searchType=${searchType}, searchWord=${searchWord})}"
			   >첫페이지</a>
			<!--          페이지 번호들 -->
			<a th:each="counter : ${#numbers.sequence(startPage, endPage)}"
			   th:href="@{/board/list(page=${counter}, searchType=${searchType}, searchWord=${searchWord})}"
			   th:text="${counter}"
			   th:classappend="${counter == page} ? 'active'"></a>
			<!--          마지막 페이지 -->
			<a th:if="${page < boardPage.totalPages}"
			   th:href="@{/board/list(page=${boardPage.totalPages}, searchType=${searchType}, searchWord=${searchWord})}"
			   >마지막페이지</a>
		</nav>
		
		<br><br>
		
		<!--       검색 폼 -->
		<form th:action="@{/board/list}" id="searchForm" method="get">
			<select name="searchType" id="searchType">
				<option value="all" th:selected="${searchType == 'all'}">전체</option>
				<option value="title" th:selected="${searchType == 'title'}">제목</option>
				<option value="contents" th:selected="${searchType == 'contents'}">본문</option>
				<option value="id" th:selected="${searchType == 'id'}">작성자 ID</option>
			</select>
			<input type="text" name="searchWord" id="searchWord" th:value="${searchWord}">
			<button type="submit">검색</button>
		</form>
	</div>
</section>
</body>
</html>
